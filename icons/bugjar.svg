<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Glass jar gradient -->
    <linearGradient id="jarGlass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a8e6cf" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#dcedc1" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#a8e6cf" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#88d8b0" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Lid metallic gradient -->
    <linearGradient id="lidMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f8c8d"/>
      <stop offset="50%" stop-color="#95a5a6"/>
      <stop offset="100%" stop-color="#7f8c8d"/>
    </linearGradient>
  </defs>

  <!-- Jar body -->
  <path d="M 36 34 L 34 38 Q 28 48 28 58 L 28 100 Q 28 112 40 112 L 88 112 Q 100 112 100 100 L 100 58 Q 100 48 94 38 L 92 34"
        fill="url(#jarGlass)" stroke="#5dbb96" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Glass shine highlight -->
  <path d="M 38 42 Q 34 52 34 60 L 34 96 Q 34 104 40 106"
        fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>

  <!-- Jar lid -->
  <rect x="32" y="22" width="64" height="14" rx="3" ry="3" fill="url(#lidMetal)" stroke="#6c7a7a" stroke-width="1.5"/>
  <!-- Lid thread lines -->
  <line x1="34" y1="26" x2="94" y2="26" stroke="#6c7a7a" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="34" y1="32" x2="94" y2="32" stroke="#6c7a7a" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- Jar neck -->
  <rect x="36" y="18" width="56" height="6" rx="1" ry="1" fill="#dcedc1" fill-opacity="0.5" stroke="#5dbb96" stroke-width="1.5"/>

  <!-- Bug body (ladybug style) -->
  <!-- Bug head -->
  <circle cx="64" cy="62" r="6" fill="#2c3e50"/>
  <!-- Bug body (oval) -->
  <ellipse cx="64" cy="76" rx="10" ry="13" fill="#e94560"/>
  <!-- Wing line -->
  <line x1="64" y1="63" x2="64" y2="89" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Bug dots -->
  <circle cx="59" cy="71" r="2" fill="#2c3e50"/>
  <circle cx="69" cy="71" r="2" fill="#2c3e50"/>
  <circle cx="58" cy="79" r="1.8" fill="#2c3e50"/>
  <circle cx="70" cy="79" r="1.8" fill="#2c3e50"/>
  <circle cx="61" cy="85" r="1.5" fill="#2c3e50"/>
  <circle cx="67" cy="85" r="1.5" fill="#2c3e50"/>

  <!-- Bug antennae -->
  <path d="M 60 58 Q 56 52 53 50" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 68 58 Q 72 52 75 50" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="53" cy="50" r="1.5" fill="#2c3e50"/>
  <circle cx="75" cy="50" r="1.5" fill="#2c3e50"/>

  <!-- Bug legs -->
  <!-- Left legs -->
  <path d="M 54 69 Q 46 66 42 63" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 54 76 Q 46 76 40 74" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 55 83 Q 47 86 42 87" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right legs -->
  <path d="M 74 69 Q 82 66 86 63" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 74 76 Q 82 76 88 74" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 73 83 Q 81 86 86 87" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
</svg>
